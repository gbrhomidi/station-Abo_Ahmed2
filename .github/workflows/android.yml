name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify java version
        run: java -version

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks

      - name: Verify keystore
        run: |
          echo "===== CURRENT DIRECTORY ====="
          pwd

          echo
          echo "===== FILES ====="
          ls -lah

          echo
          echo "===== KEYSTORE INFO ====="
          file my-upload-key.jks || true

          echo
          echo "===== KEYSTORE SIZE ====="
          ls -lh my-upload-key.jks || true

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Clean and Build Release APK
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace --info
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Show build outputs
        run: |
          echo "===== APK FILES ====="
          find app/build -type f -name "*.apk"

          echo
          echo "===== AAB FILES ====="
          find app/build -type f -name "*.aab"

          echo
          echo "===== ALL OUTPUT FILES ====="
          find app/build/outputs -type f

          echo
          echo "===== APK DETAILS ====="
          ls -lahR app/build/outputs || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Station_Abo_Ahmed_Release_APK
          path: app/build/outputs/**/*.apk
          if-no-files-found: error
